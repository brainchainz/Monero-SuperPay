releaseNotes: >-
  v1.2.0: Manual node picker (public, custom, Tor) alongside auto-detected Umbrel node.
  Store import/export (.superpay files). Order cancellation fix. Receipt print fix.
  Security hardening: rate limiting, CSV injection prevention, WebSocket store filtering,
  wallet overwrite protection. PIN lock crypto.subtle fallback for HTTP access.
